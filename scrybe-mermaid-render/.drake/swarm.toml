# .drake/swarm.toml — durable swarm config for scrybe-mermaid-render.
#
# Lives under `.drake/` (analogous to `.github/workflows/`) so the
# project source tree stays free of tooling-specific files at the
# top level. Drake infrastructure is replaceable; the source code
# isn't. If drake gets swapped out for a different orchestrator,
# this dot-directory disappears without touching the actual project.
#
# ## Goals are transient; this file isn't.
#
# Previously this file mixed durable swarm config (fleet, criteria,
# guards) with transient work items (per-phase goal prompts). Per the
# goals-are-transient redesign (gilabot#1810, 2026-05-25), goals now
# live as GitHub issues. Foreman pulls each one at dispatch time:
#
#   drake-foreman \
#     --config scrybe-mermaid-render/.drake/swarm.toml \
#     --goal-from-issue hartsock/scrybe#52
#
# This file holds only the slow-moving stuff: which workers fan out,
# arbiter quorum config, token guards, structural / style criteria.
# A new issue (e.g. scrybe#86) is dispatchable without touching this
# file — the swarm.toml describes WHO and HOW, the issue describes
# WHAT.
#
# ## Topology (durable)
#
# Workers (drake-pool fan-out) → 5 code-producing agents across
# providers + hardware (claude, codex, codex-dgx, codex-dgx-nemotron,
# codex-gnuc-coder). See `[swarm.bake_off]` below.
#
# Arbiter (drake-arbiter trio) → small-judge quorum picks Winner /
# Refine / FreshStart per round. Strictness = "loose" biases toward
# selecting a Winner instead of looping on Refine forever (a v2-70b-
# fleet failure mode that motivated the v3 redesign).
#
# Foreman → records every round to
#   /workspaces/.drake-state/calibration/scrybe-mermaid-render.ndjson
#
# ## Design contract (project-level, not swarm-level)
#
# SVG is the primary output. Every SVG embeds the Mermaid source in a
# <metadata> element (namespace https://scrybe.ai/ns/mermaid) so
# diagrams are self-describing and round-trippable. PNG is a secondary
# conversion via resvg. These contracts are encoded in the structural-
# correctness criterion below; per-goal acceptance criteria live in
# the GitHub issue.
#
# ## Workspace isolation
#
# drake-foreman B4 (gilabot#1695) provisions one git-worktree-per-
# worker before each round and rsyncs the winning rung's edits back
# onto `default_workspace_path` on Pass. The bare-repo-not-forge work
# (gilabot#1805) then pushes each rung branch into a swarm-internal
# bare repo at `/workspaces/.drake-state/swarm-git/<project>.git`
# for review via the drake-observatory storyboard.

[swarm]
name                   = "scrybe-mermaid-render"
max_rounds             = 3       # B4 enabled; refinement chain is safe.
default_timeout_seconds = 1800   # 30 min — Rust workspace can be slow to compile + test.
default_workspace_path  = "/workspaces/scrybe/scrybe-mermaid-render"

# Policy hints kept for future use — the bake-off prompt could surface
# these as `consider_criteria` once SSIM-aware grading lands. For now
# they're documentation, not active config.
ssim_threshold      = 0.92
structural_required = true

# Soft cap on cumulative tokens across all workers + rounds of a
# single goal. Captures recursive context bloat (the dominant YOLO-
# mode failure mode for long-lived ACP sessions) before it hits
# `context_length_exceeded` on the provider side. Foreman bails the
# goal with outcome `token-cap` when the running total crosses this.
# 500k is generous headroom for a 5-worker × 3-round bake-off against
# modern context windows; tighten as we observe real-run telemetry.
[swarm.guards]
max_tokens_per_goal = 500_000

# ── Bake-off dispatch ───────────────────────────────────────────────
#
# v3 5-worker lineup (gilabot#1708 2026-05-19) — diverse providers
# across gnuc + DGX. Mixing local + paid-API workers keeps cost down
# while preserving Anthropic + OpenAI as quality anchors.
#   - claude              : Anthropic Sonnet (quality anchor, ACP)
#   - codex-openai        : OpenAI GPT-5/Codex (diversity anchor, ACP)
#   - codex-dgx           : qwen3-coder:30b on DGX Ollama (local, capable)
#   - codex-dgx-nemotron  : nemotron-3-nano:30b on DGX Ollama (local, diverse)
#   - codex-gnuc-coder    : qwen2.5-coder:14b on gnuc Ollama (local, cheap)
#
# Pod-name vs subject-name quirk: drake-pool-codex-openai-worker
# listens on `drake.pool.tasks.acp.codex` (subject suffix `codex`,
# deploy oddity from when there was only one codex worker). Until
# that subject is renamed, use `codex` here, not `codex-openai`.
#
# `arbiter_timeout_seconds = 240` is fine for the v3 small-judge
# fleet (deepseek-r1:1.5b + nemotron-mini:4b + qwen2.5-coder:7b on
# gnuc — gilabot#1708 2026-05-19). The v2 70b lineup thrashed DGX
# VRAM and consistently hit 600s; v3 grades in <60s/replica. The
# cost is small-judge brittleness — see `strictness = "loose"`
# below.

[swarm.bake_off]
workers = [
  "claude",
  "codex",
  "codex-dgx",
  "codex-dgx-nemotron",
  "codex-gnuc-coder",
]
arbiter_timeout_seconds = 240

# `loose` biases the v3 small judges toward picking a Winner instead
# of the all-Refine failure mode. Dial up to `default` once we see
# the bake-off converge, or `strict` once the per-rung PR queue gets
# long enough to triage manually.
[swarm.bake_off.arbiter]
strictness = "loose"

# Per-rung PR mode — after every round, foreman opens one PR per
# non-erroring candidate; branch + title identify the worker model,
# arbiter consensus notes land as PR comments identifying the
# replica lineage. Labels: `drake/winner` / `drake/refine` /
# `drake/rejected`. Reviewer (human) is the merge gate; the arbiter
# is advisory.
#
# **Deploy dependency:** foreman pod must have `gh` CLI installed
# and a GH token mounted. The bare-repo-not-forge work
# (gilabot#1805/#1807) is shifting this to an operator-triggered
# button in the dashboard storyboard, but per-rung-PR is still the
# default until that surface lands.
[swarm.bake_off.output]
mode        = "per-rung-pr"
gh_repo     = "hartsock/scrybe"
base_branch = "feat/scrybe-mermaid-render"

# `consider_criteria` steers the arbiter prompt's pick logic. Each
# criterion gets one bullet in the bake-off prompt; the arbiter is
# free to weigh them however it sees fit. Stable ids so an operator
# can grep ndjson + KV consensus entries.
#
# These are PROJECT-LEVEL criteria that apply to every flight. Per-
# goal criteria belong in the GitHub issue body — workers and arbiters
# see both in the same prompt.

[[swarm.bake_off.consider_criteria]]
id          = "compiles-cleanly"
instruction = "Code compiles with zero `cargo clippy -- -D warnings` warnings."

[[swarm.bake_off.consider_criteria]]
id          = "tests-added"
instruction = "Unit tests cover at least the cases listed in the goal prompt; no `#[ignore]` on stubs that should now pass."

[[swarm.bake_off.consider_criteria]]
id          = "style"
instruction = "Match scrybe project conventions: zero clippy warnings, idiomatic Rust, no `unwrap()` on user-facing paths, `Result<T, ScrybeError>` returns, docstrings on public APIs."

[[swarm.bake_off.consider_criteria]]
id          = "structural-correctness"
instruction = "Tier-1 structural check passes: SVG output contains the <metadata> block with <scrybe:source> + <scrybe:sha256> (when applicable to the goal)."

# ── Dispatch a flight ────────────────────────────────────────────────
#
# Pick one or more open issues from the scrybe-mermaid-render set
# (https://github.com/hartsock/scrybe/issues — labels:
# `mermaid-render`, sub-issues of #37) and pass them to foreman:
#
#   drake-foreman \
#     --config scrybe-mermaid-render/.drake/swarm.toml \
#     --goal-from-issue hartsock/scrybe#52
#
# Or fan out across multiple issues in one flight:
#
#   drake-foreman \
#     --config scrybe-mermaid-render/.drake/swarm.toml \
#     --goal-from-issue hartsock/scrybe#52 \
#     --goal-from-issue hartsock/scrybe#53
#
# The phase id ends up as `issues-52` (or `issues-52-53`), making
# the audit trail in `<project>.ndjson` obvious.
