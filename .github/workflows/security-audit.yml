name: security-audit

# Privacy + secret-leak guardrails. This MUST stay green: it is the gate that
# keeps secrets and internal/operational specifics out of this public repository.
#
# Hook parity counterpart: .githooks/pre-push (see the `security-audit` section
# there). When editing this workflow, update the push hook to match, and vice
# versa (see AGENTS.md "CI / Hook Parity").
#
# Unlike ci.yml/release.yml, this gate runs on GITHUB-HOSTED runners
# (ubuntu-latest): it is cheap, needs no Tauri system deps, and must stay
# reliable/isolated even when the self-hosted farm is down. Actions are pinned
# to Node-24-compatible majors (actions/checkout@v5).

on:
  push:
    branches: ["main", "feat/**", "fix/**", "release/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Run the open-source gitleaks binary directly. The gitleaks-action wrapper
      # requires a paid GITLEAKS_LICENSE for ORGANIZATION repos; the binary is
      # free for everyone. Pin the version so a bad release can't break the gate.
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner --verbose

  internal-specifics:
    name: internal-specifics linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run internal-specifics linter
        run: bash scripts/check-internal-specifics.sh
