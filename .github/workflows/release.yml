# Hook parity counterpart: .githooks/pre-push
name: Release

on:
  push:
    # Tag pushes (e.g. v0.1.0) — full release: Tauri installers + PyPI wheels.
    # Branch pushes to release/** — PyPI wheels + metapackage only; Tauri
    # installer upload is gated on a tag ref (see build-app job below).
    # Both contexts must be allowed by the `pypi` GitHub Actions environment's
    # deployment-branches rule for OIDC trusted publishing to fire.
    tags:
      - "v*"
    branches:
      - "release/**"

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  # ── Desktop app installers ────────────────────────────────────────────────

  build-app:
    name: Desktop app (${{ matrix.label }})
    # Tag-only — `tauri-action` creates a GitHub Release named after
    # github.ref_name, which only makes sense for a tag (e.g. v0.1.0).
    # Branch pushes to `release/**` skip this job and ship PyPI wheels only.
    if: startsWith(github.ref, 'refs/tags/')
    # Release builds always use GitHub-hosted runners:
    # - macOS arm64 requires Apple Silicon (M-series) runners on GitHub
    # - Windows/Linux builds are unavailable on the local ARC farm
    # CI lint/test uses self-hosted runners (see ci.yml).
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # M-series Apple Silicon
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: ubuntu-22.04
            args: ""
            label: linux-x86_64
          - platform: windows-latest
            args: ""
            label: windows-x86_64
          # macOS Intel (macos-13 runner) was dropped from the matrix:
          # GitHub-hosted Intel Mac runners have multi-hour queue times
          # as Apple winds down x86_64 hardware. Apple Silicon users get
          # a native arm64 DMG; Intel Mac users can run that DMG via
          # Rosetta 2 or build from source. Restore this entry if the
          # runner queue improves or we set up a self-hosted Intel Mac.

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scrybe-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config

      - name: Install frontend deps
        working-directory: scrybe-app
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: scrybe-app
          tagName: ${{ github.ref_name }}
          releaseName: "Scrybe ${{ github.ref_name }}"
          releaseBody: |
            ## Scrybe ${{ github.ref_name }}

            ### Install

            **macOS (Apple Silicon):** Download `Scrybe_*_aarch64.dmg`
            **macOS (Intel):** Use the Apple Silicon `.dmg` via Rosetta 2, or build from source (`scrybe-app/`)
            **Windows:** Download `Scrybe_*_x64-setup.exe` or `Scrybe_*_x64_en-US.msi`
            **Linux:** Download `Scrybe_*_amd64.AppImage`, `.deb`, or `.rpm`

            **Python (all platforms):**
            ```bash
            pip install scrybe.ai          # full toolkit (library + CLI + MCP server + mermaid + docx)
            # or pick individual pieces:
            pip install scrybe-cli scrybe-mcp-server scrybe-py scrybe-mermaid scrybe-plugin-docx
            ```

            ### What's new
            See [CHANGELOG.md](https://github.com/hartsock/scrybe/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Python wheels (maturin — Rust-backed crates) ─────────────────────────

  build-wheels:
    name: Python wheels (${{ matrix.crate }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crate: [scrybe-py, scrybe-cli, scrybe-mcp-server, scrybe-mermaid]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.crate }}-${{ matrix.os }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.crate }}
          command: build
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.crate }}-${{ matrix.os }}
          path: ${{ matrix.crate }}/dist/*.whl

  # ── Source distributions (sdists) for each maturin crate ──────────────────
  #
  # Wheels cover the majority of installs, but sdists are the portable
  # fallback for any platform/Python combination we don't ship a wheel
  # for. Without an sdist on PyPI, users on uncovered Python versions
  # get "No matching distribution found" with no recourse. One sdist
  # per crate, built on Linux (sdist content is platform-independent).

  build-sdists:
    name: Sdist (${{ matrix.crate }})
    strategy:
      fail-fast: false
      matrix:
        crate: [scrybe-py, scrybe-cli, scrybe-mcp-server, scrybe-mermaid]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.crate }}
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist-${{ matrix.crate }}
          path: ${{ matrix.crate }}/dist/*.tar.gz

  # ── Pure-Python metapackage (scrybe.ai) ───────────────────────────────────

  build-meta:
    name: Metapackage (scrybe.ai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: scrybe-meta
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: meta-scrybe-ai
          path: scrybe-meta/dist/*

  # ── Pure-Python docx exporter package ────────────────────────────────────

  build-docx:
    name: Package (scrybe-plugin-docx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: scrybe-plugin-docx
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-scrybe-plugin-docx
          path: scrybe-plugin-docx/dist/*

  # ── Publish to PyPI (trusted publishing — OIDC, per-package) ──────────────
  #
  # One job per PyPI project so a missing-publisher 403 on one doesn't abort
  # the others. `continue-on-error: true` on each lets the workflow as a
  # whole succeed even when, say, `scrybe-mcp-server` hasn't had its
  # trusted publisher set up yet — the projects with publishers configured
  # still publish, and the ones without just turn red without blocking.
  #
  # This is what makes the iterative-activation bootstrap pattern work
  # (register pending publisher for project X → push release branch →
  # project X publishes via OIDC → register next pending publisher → repeat).

  publish-pypi:
    name: Publish ${{ matrix.package.name }}
    needs: [build-wheels, build-sdists, build-meta, build-docx]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # OIDC trusted publishing — no API token needed
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package:
          # Filename-glob matches BOTH the wheels and the sdist for each
          # PyPI project (PEP 503 normalization: scrybe.ai → scrybe_ai,
          # scrybe-cli → scrybe_cli, etc.).
          - { name: scrybe.ai,         glob: scrybe_ai-* }
          - { name: scrybe-cli,        glob: scrybe_cli-* }
          - { name: scrybe-py,         glob: scrybe_py-* }
          - { name: scrybe-mcp-server, glob: scrybe_mcp_server-* }
          - { name: scrybe-mermaid,    glob: scrybe_mermaid-* }
          - { name: scrybe-plugin-docx, glob: scrybe_plugin_docx-* }

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Filter to ${{ matrix.package.name }}
        run: |
          mkdir -p dist
          find all-artifacts -name '${{ matrix.package.glob }}' -exec cp {} dist/ \;
          echo "::group::dist/ contents for ${{ matrix.package.name }}"
          ls -la dist/
          echo "::endgroup::"

      - name: Publish ${{ matrix.package.name }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: if a release/** branch push and a v* tag push both
          # build the same version, the second upload no-ops instead of
          # erroring. Lets the user freely release from either trigger.
          skip-existing: true

  # ── Publish to crates.io (Rust library + binary crates) ───────────────────
  #
  # Tag-only — branch pushes to release/** build wheels but don't publish to
  # crates.io. Once a crate version lands on crates.io it cannot be re-uploaded
  # under the same version (only yanked), so accidental publication from a
  # release-branch push would be expensive to undo.
  #
  # Runs on the self-hosted scrybe-k3s scale set. The runner pod has
  # CARGO_REGISTRY_TOKEN injected from a Vault-backed k8s Secret
  # (secret/release/crates-io/claude-ai → scrybe-crates-io-token via VSO);
  # see my_home/manifests/arc/scrybe-vso/ + scrybe-runners-values.yml.
  #
  # Sequenced (not matrix-parallel) because crates with internal path-deps
  # need their dependencies on crates.io before the publish call resolves.
  # `cargo publish` blocks until the new version is live on the index, so
  # serial chaining is safe. Topological order:
  #
  #     scrybe-mermaid  scrybe-core  scrybe-rpc      ← independent leaves
  #                          ↓
  #                    scrybe-render
  #                          ↓
  #                   scrybe-mcp-server
  #                          ↓
  #                     scrybe-cli
  #
  # `cargo publish` returns success on "version already exists" only when
  # `--allow-dirty` is set AND we explicitly ignore the error — we DO NOT do
  # that here. If a release fails partway through, RC iteration is the
  # recovery path: bump to rc2, re-tag, the leaves that already published
  # under rc1 won't matter because rc2 is a fresh version everywhere.

  publish-crates:
    name: Publish ${{ matrix.crate.name }} → crates.io
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, build-sdists, build-meta, build-docx]
    runs-on: scrybe-k3s
    strategy:
      fail-fast: false   # let independent leaves keep going if one of them fails
      max-parallel: 1    # but ALWAYS one at a time — internal deps need order
      matrix:
        # Order encoded as a list; matrix iterates in array order with
        # max-parallel=1, so this IS the topological sequence.
        crate:
          - { name: scrybe-mermaid,    pkg: scrybe-mermaid }
          - { name: scrybe-core,       pkg: scrybe-core }
          - { name: scrybe-rpc,        pkg: scrybe-rpc }
          - { name: scrybe-render,     pkg: scrybe-render }
          - { name: scrybe-mcp-server, pkg: scrybe-mcp-server }
          - { name: scrybe-cli,        pkg: scrybe-cli }

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-${{ matrix.crate.name }}

      - name: Confirm CARGO_REGISTRY_TOKEN is mounted
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN not in environment — check VSO sync at scrybe-crates-io-token"
            exit 1
          fi
          echo "CARGO_REGISTRY_TOKEN: present (${#CARGO_REGISTRY_TOKEN} chars)"

      - name: cargo publish ${{ matrix.crate.pkg }}
        # --no-verify: skip the local "extract tarball + rebuild" step.
        # `cargo publish`'s verify pass writes to the cargo cache at
        # CARGO_HOME (= /usr/local/cargo on this runner image), which is
        # mounted from a FlexClone subPath that the runner user doesn't
        # own — every dep fetch fails with "Permission denied (os error
        # 13)". The verify pass is also redundant: the Rust lint + tests
        # in ci.yml + the build-wheels jobs above already exercise this
        # exact code on the same commit. We keep --locked so Cargo.lock
        # drift still fails the publish.
        run: cargo publish -p ${{ matrix.crate.pkg }} --locked --no-verify
        env:
          CARGO_TERM_COLOR: always
