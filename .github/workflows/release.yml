name: Release

on:
  push:
    # Tag pushes (e.g. v0.1.0) — full release: Tauri installers + PyPI wheels.
    # Branch pushes to release/** — PyPI wheels + metapackage only; Tauri
    # installer upload is gated on a tag ref (see build-app job below).
    # Both contexts must be allowed by the `pypi` GitHub Actions environment's
    # deployment-branches rule for OIDC trusted publishing to fire.
    tags:
      - "v*"
    branches:
      - "release/**"

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  # ── Desktop app installers ────────────────────────────────────────────────

  build-app:
    name: Desktop app (${{ matrix.label }})
    # Tag-only — `tauri-action` creates a GitHub Release named after
    # github.ref_name, which only makes sense for a tag (e.g. v0.1.0).
    # Branch pushes to `release/**` skip this job and ship PyPI wheels only.
    if: startsWith(github.ref, 'refs/tags/')
    # Release builds always use GitHub-hosted runners:
    # - macOS arm64 requires Apple Silicon (M-series) runners on GitHub
    # - Windows/Linux builds are unavailable on the local ARC farm
    # CI lint/test uses self-hosted runners (see ci.yml).
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # M-series Apple Silicon
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: macos-13          # Intel x86_64
            args: "--target x86_64-apple-darwin"
            label: macos-x86_64
          - platform: ubuntu-22.04
            args: ""
            label: linux-x86_64
          - platform: windows-latest
            args: ""
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scrybe-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config

      - name: Install frontend deps
        working-directory: scrybe-app
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: scrybe-app
          tagName: ${{ github.ref_name }}
          releaseName: "Scrybe ${{ github.ref_name }}"
          releaseBody: |
            ## Scrybe ${{ github.ref_name }}

            ### Install

            **macOS (Apple Silicon):** Download `Scrybe_*_aarch64.dmg`
            **macOS (Intel):** Download `Scrybe_*_x86_64.dmg`
            **Windows:** Download `Scrybe_*_x86_64-setup.exe`
            **Linux:** Download `scrybe_*_amd64.AppImage` or `.deb`

            **Python (all platforms):**
            ```bash
            pip install scrybe.ai          # full toolkit (library + CLI + MCP server + mermaid)
            # or pick individual pieces:
            pip install scrybe-cli scrybe-mcp-server scrybe-py scrybe-mermaid
            ```

            ### What's new
            See [CHANGELOG.md](https://github.com/hartsock/scrybe/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Python wheels (maturin — Rust-backed crates) ─────────────────────────

  build-wheels:
    name: Python wheels (${{ matrix.crate }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crate: [scrybe-py, scrybe-cli, scrybe-mcp-server, scrybe-mermaid]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.crate }}-${{ matrix.os }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.crate }}
          command: build
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.crate }}-${{ matrix.os }}
          path: ${{ matrix.crate }}/dist/*.whl

  # ── Pure-Python metapackage (scrybe.ai) ───────────────────────────────────

  build-meta:
    name: Metapackage (scrybe.ai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: scrybe-meta
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: meta-scrybe-ai
          path: scrybe-meta/dist/*

  # ── Publish to PyPI (trusted publishing — OIDC) ───────────────────────────

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-meta]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # OIDC trusted publishing — no API token needed

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: meta-scrybe-ai
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: if a release/** branch push and a v* tag push both
          # build the same version, the second upload no-ops instead of
          # erroring. Lets the user freely release from either trigger.
          skip-existing: true
