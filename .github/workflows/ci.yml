# Hook parity counterpart: .githooks/pre-push
name: CI

# Runs on self-hosted ARC runners for fast feedback on lint and tests.
# Release builds (multi-platform installers) run on GitHub-hosted runners
# via release.yml — those need Apple Silicon which isn't in the local farm.

on:
  push:
    branches: ["main", "feat/**", "fix/**", "release/**"]
  pull_request:
    branches: ["main"]

env:
  RUST_BACKTRACE: 1
  # The scrybe-k3s runner image bakes CARGO_HOME=/usr/local/cargo (root-owned)
  # which the runner user cannot write to, so cargo fails with "Permission
  # denied (os error 13)" on the first index/cache write. Override to a
  # tmpfs-backed path the runner user owns. Until this is fixed in the
  # runner image, every cargo-touching job must inherit this env.
  CARGO_HOME: /tmp/.cargo

jobs:
  lint-rust:
    name: Rust lint
    runs-on: scrybe-k3s
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Tauri on Linux)
        # `cargo clippy --all-targets` includes scrybe-app/src-tauri, whose
        # build deps (glib-sys, gtk-sys, libwebkit2gtk-sys) need pkg-config
        # to find the matching system libraries. Mirrors the test-rust job.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config
      - name: fmt check
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  test-rust:
    name: Rust tests
    runs-on: scrybe-k3s
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Tauri on Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config
      - name: test (excluding scrybe-app)
        run: cargo test --workspace --exclude scrybe-app

  lint-ts:
    name: TypeScript lint
    runs-on: scrybe-k3s
    defaults:
      run:
        working-directory: scrybe-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scrybe-app/package-lock.json
      - run: npm ci
      - run: npm run build
