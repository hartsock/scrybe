# Hook parity counterpart: .githooks/pre-push
name: CI

# Runs on self-hosted ARC runners for fast feedback on lint and tests.
# Release builds (multi-platform installers) run on GitHub-hosted runners
# via release.yml — those need Apple Silicon which isn't in the local farm.

on:
  push:
    branches: ["main", "feat/**", "fix/**", "release/**"]
  pull_request:
    branches: ["main"]

env:
  RUST_BACKTRACE: 1
  # The scrybe-k3s runner image bakes CARGO_HOME=/usr/local/cargo (root-owned)
  # which the runner user cannot write to, so cargo fails with "Permission
  # denied (os error 13)" on the first index/cache write. Override to a
  # tmpfs-backed path the runner user owns. Until this is fixed in the
  # runner image, every cargo-touching job must inherit this env.
  CARGO_HOME: /tmp/.cargo

jobs:
  lint-rust:
    name: Rust lint
    runs-on: scrybe-k3s
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Tauri on Linux)
        # `cargo clippy --all-targets` includes scrybe-app/src-tauri, whose
        # build deps (glib-sys, gtk-sys, libwebkit2gtk-sys) need pkg-config
        # to find the matching system libraries. Mirrors the test-rust job.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config
      - name: fmt check
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Check feature-gated python bindings
        # The `python` feature only compiles under maturin wheel builds, so
        # `cargo test/clippy --workspace` never sees it — a broken binding
        # ships straight to the release run (v0.6.0: E0382 in py_extract).
        # HOOK PARITY: mirrored by .githooks/pre-push.
        run: cargo check -p scrybe-mermaid --features python
      - name: Clippy feature-gated scrybe-ratatui highlight (both states)
        # Same rationale as the python-bindings check above: feature-gated
        # code that the workspace run never sees ships unseen (v0.6.0).
        # `highlight` (#164) is off by default, but workspace-wide clippy
        # unifies features (scrybe-tui enables it), so the workspace run only
        # ever lints the feature-ON build — lint the crate alone in BOTH
        # states so the default (feature-off) surface stays clean too.
        # HOOK PARITY: mirrored by .githooks/pre-push.
        run: |
          cargo clippy -p scrybe-ratatui --all-targets -- -D warnings
          cargo clippy -p scrybe-ratatui --all-targets --features highlight -- -D warnings

  test-rust:
    name: Rust tests
    runs-on: scrybe-k3s
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Tauri on Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config
      - name: test (excluding scrybe-app)
        run: cargo test --workspace --exclude scrybe-app
      - name: test feature-gated scrybe-ratatui highlight (both states)
        # Same rationale as lint-rust's "Check feature-gated python bindings":
        # feature-gated code the workspace run never sees ships unseen
        # (v0.6.0). The workspace test unifies features (scrybe-tui enables
        # `highlight`), so it only exercises the feature-ON build — run the
        # crate alone in BOTH states so the default surface is tested too.
        # HOOK PARITY: mirrored by .githooks/pre-push.
        run: |
          cargo test -p scrybe-ratatui
          cargo test -p scrybe-ratatui --features highlight

  # Windows coverage. The self-hosted farm above is Linux-only and the Linux
  # test job excludes scrybe-app, so Windows-specific breakage in scrybe-app
  # (e.g. a test hardcoding a Unix "/tmp" path) went completely uncaught by CI
  # and only surfaced in the external nightly Windows check (#135). This job
  # runs the FULL `cargo test --workspace` — including scrybe-app — on a
  # GitHub-hosted Windows runner (release.yml already builds the Tauri app on
  # windows-latest), so that class of failure is caught at PR time, not nightly.
  # CI-only by nature: the .githooks/pre-push hook runs on Linux/macOS dev boxes
  # and cannot mirror a Windows job — Windows parity lives here, not in the hook.
  test-rust-windows:
    name: Rust tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scrybe-app/package-lock.json
      - name: Build frontend (Tauri build script needs scrybe-app/dist)
        working-directory: scrybe-app
        run: |
          npm ci
          npm run build
      - name: test (full workspace, incl. scrybe-app — mirrors the nightly Windows check)
        run: cargo test --workspace

  lint-ts:
    name: TypeScript lint
    runs-on: scrybe-k3s
    defaults:
      run:
        working-directory: scrybe-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scrybe-app/package-lock.json
      - run: npm ci
      - run: npm run build

  test-npm:
    name: npm shim tests
    runs-on: scrybe-k3s
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Dependency-free (node:test only) — no `npm ci`.
      - run: npm test
